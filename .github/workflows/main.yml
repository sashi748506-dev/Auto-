name: Auto Copyright Free Video
on:
  push:
    paths:
      - 'input/**'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Process Videos
        run: |
          mkdir -p output
          # Input folder se saari mp4 files uthayega
          for f in input/*.mp4; do
            [ -e "$f" ] || continue
            echo "Processing $f..."
            ffmpeg -i "$f" \
            -vf "hflip,scale=1.1*iw:-1,crop=iw/1.1:ih/1.1,setpts=1.1*PTS,eq=saturation=1.3:contrast=1.1:brightness=0.02" \
            -af "atempo=0.9,asetrate=44100*0.9,aresample=44100,aecho=0.8:0.88:60:0.4" \
            -c:v libx264 -preset superfast -crf 22 \
            -c:a aac -b:a 128k \
            "output/edited_${f##*/}"
          done

      - name: Upload Edited Videos
        uses: actions/upload-artifact@v3
        with:
          name: my-edited-videos
          path: output/
          
